<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MythicUpgrades Wiki</title>
  <style>
    :root {
      --bg:       #0d0f14;
      --surface:  #161a22;
      --surface2: #1e2430;
      --border:   #2a3040;
      --text:     #c8d0e0;
      --muted:    #6b7a96;
      --accent:   #7c6af5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,15,20,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      padding: 0 24px; height: 56px;
    }
    nav .logo {
      font-weight: 800; font-size: 18px;
      background: linear-gradient(135deg,#a78bfa,#38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-right: 16px; white-space: nowrap;
    }
    nav button {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 6px 16px; border-radius: 6px;
      font-size: 14px; font-weight: 500; transition: .15s;
    }
    nav button:hover { color: var(--text); background: var(--surface2); }
    nav button.active { color: #fff; background: var(--surface2); }

    /* ── HERO ── */
    .hero {
      text-align: center; padding: 72px 24px 48px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1535 0%, transparent 70%);
    }
    .hero h1 {
      font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg,#a78bfa 0%,#38bdf8 50%,#34d399 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--muted); margin-top: 12px; font-size: 1.05rem; }

    /* ── SECTIONS ── */
    .section { display: none; padding: 0 24px 80px; max-width: 1300px; margin: 0 auto; }
    .section.active { display: block; }

    .section-title {
      font-size: 1.6rem; font-weight: 800; margin: 48px 0 24px;
      color: #e2e8f0; border-left: 4px solid var(--accent);
      padding-left: 14px;
    }

    /* ── GEM GRID ── */
    .gem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .gem-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .gem-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .gem-header {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .gem-header::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--gem-color, #7c6af5) 0%, transparent 60%);
      opacity: .12;
    }
    .gem-icon {
      width: 48px; height: 48px;
      image-rendering: pixelated;
      border-radius: 8px;
      background: var(--surface2);
      padding: 4px;
      flex-shrink: 0;
    }
    .gem-name {
      font-size: 1.2rem; font-weight: 800;
      color: var(--gem-color, #a78bfa);
    }
    .gem-tagline { font-size: .8rem; color: var(--muted); }

    .gem-body { padding: 16px 20px; }

    /* items strip */
    .item-strip {
      display: flex; gap: 6px; flex-wrap: wrap;
      background: var(--surface2); border-radius: 8px;
      padding: 8px 10px; margin-bottom: 14px;
    }
    .item-strip img {
      width: 28px; height: 28px;
      image-rendering: pixelated;
      opacity: .85;
      transition: opacity .15s, transform .15s;
    }
    .item-strip img:hover { opacity: 1; transform: scale(1.3); }

    /* ability block */
    .ability {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
      border-left: 3px solid var(--gem-color, var(--accent));
    }
    .ability-name {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--gem-color, var(--accent));
      margin-bottom: 6px;
    }
    .stat-row {
      display: flex; justify-content: space-between;
      font-size: .82rem; padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); }
    .stat-val { color: #e2e8f0; font-weight: 600; }

    .levels-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .level-badge {
      font-size: .72rem; padding: 2px 8px;
      border-radius: 99px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--muted);
    }

    /* ── BLOCKS SECTION ── */
    .block-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 14px;
    }
    .block-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
      transition: transform .15s;
    }
    .block-card:hover { transform: scale(1.06); }
    .block-card img {
      width: 56px; height: 56px;
      image-rendering: pixelated;
      display: block; margin: 0 auto 6px;
    }
    .block-card span {
      font-size: .68rem; color: var(--muted);
      display: block; line-height: 1.3;
    }

    /* ── EFFECTS SECTION ── */
    .effect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .effect-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .effect-card img {
      width: 36px; height: 36px;
      image-rendering: pixelated; flex-shrink: 0;
    }
    .effect-name { font-size: .85rem; font-weight: 600; }
    .effect-desc { font-size: .75rem; color: var(--muted); }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 32px 24px;
      color: var(--muted); font-size: .8rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>

// ─────────────────────────────────────────────────────────
//  RENDER GEMS
// ─────────────────────────────────────────────────────────
const TOOLS = ['sword','pickaxe','axe','shovel','hoe'];
const ARMOR = ['helmet','chestplate','leggings','boots'];
const PIECE_LABEL = ['Helmet','Chestplate','Leggings','Boots'];

function img(src, title='', cls='') {
  return `<img src="${src}" title="${title}" class="${cls}" onerror="this.style.opacity='.2'">`;
}

document.getElementById('gemGrid').innerHTML = GEMS.map(g => {
  const base = RAW + 'item/' + g.id;
  const toolStrip = TOOLS.map(t => img(base + `_${t}.png`, t)).join('');
  const armorStrip = ARMOR.map(a => img(base + `_${a}.png`, a)).join('');
  const armorStatRows = g.armorAbility.stats.map(([l,v]) =>
    `<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`
  ).join('');
  const toolStatRows = g.toolAbility.stats.map(([l,v]) =>
    `<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`
  ).join('');
  const lvlBadges = ARMOR.map((a,i) => {
    const lvl = g.armorLevels[i];
    const label = PIECE_LABEL[i];
    return `<span class="level-badge">${label} Lv ${lvl}</span>`;
  }).join('');

  return `
  <div class="gem-card" style="--gem-color:${g.color}">
    <div class="gem-header">
      ${img(base + '.png', g.name, 'gem-icon')}
      <div>
        <div class="gem-name">${g.name}</div>
        <div class="gem-tagline">${g.tagline}</div>
      </div>
      ${img(base + '_ingot.png', g.name + ' Ingot', 'gem-icon')}
    </div>
    <div class="gem-body">
      <div class="item-strip">
        ${img(base + '_crystal_shard.png','Crystal Shard')}
        ${armorStrip}
        ${toolStrip}
      </div>
      <div class="ability">
        <div class="ability-name">Armor — ${g.armorAbility.name}</div>
        ${armorStatRows}
        <div class="levels-row">${lvlBadges}</div>
      </div>
      <div class="ability">
        <div class="ability-name">Tool — ${g.toolAbility.name}</div>
        ${toolStatRows}
      </div>
    </div>
  </div>`;
}).join('');

// ─────────────────────────────────────────────────────────
//  RENDER BLOCKS
// ─────────────────────────────────────────────────────────
const GEM_IDS = GEMS.map(g => g.id);
const BLOCK_BASE = RAW + 'block/';

document.getElementById('oreGrid').innerHTML = GEM_IDS.flatMap(id => [
  { file: id + '_ore.png',            label: id.charAt(0).toUpperCase()+id.slice(1) + ' Ore' },
  { file: 'deepslate_' + id + '_ore.png', label: 'Deepslate ' + id.charAt(0).toUpperCase()+id.slice(1) + ' Ore' },
]).concat([
  { file: 'necoium_ore.png',           label: 'Necoium Ore' },
  { file: 'deepslate_necoium_ore.png', label: 'Deepslate Necoium Ore' },
]).map(({file,label}) =>
  `<div class="block-card">
    ${img(BLOCK_BASE+file, label)}
    <span>${label}</span>
  </div>`
).join('');

const CRYSTAL_SUFFIXES = [
  ['_crystal_block.png','Crystal Block'],
  ['_budding_crystal.png','Budding Crystal'],
  ['_crystal_bricks.png','Crystal Bricks'],
  ['_crystal_pillar.png','Crystal Pillar'],
];
document.getElementById('crystalGrid').innerHTML = GEM_IDS.flatMap(id =>
  CRYSTAL_SUFFIXES.map(([suf,type]) => {
    const label = id.charAt(0).toUpperCase()+id.slice(1) + ' ' + type;
    return `<div class="block-card">
      ${img(BLOCK_BASE + id + suf, label)}
      <span>${label}</span>
    </div>`;
  })
).join('');

// ─────────────────────────────────────────────────────────
//  TAB SWITCHING
// ─────────────────────────────────────────────────────────
function show(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
</script>
